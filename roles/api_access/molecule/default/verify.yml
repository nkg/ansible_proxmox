---
- name: Verify
  hosts: all
  become: true
  tasks:
    - name: Get the iac user
      ansible.builtin.getent:
        database: passwd
        key: iac

    - name: Check the passwordless sudoers drop-in
      ansible.builtin.stat:
        path: /etc/sudoers.d/iac
      register: api_access_verify_sudoers

    - name: Read the sudoers drop-in
      ansible.builtin.slurp:
        src: /etc/sudoers.d/iac
      register: api_access_verify_sudoers_content
      when: api_access_verify_sudoers.stat.exists

    - name: Read the authorized_keys
      ansible.builtin.slurp:
        src: /home/iac/.ssh/authorized_keys
      register: api_access_verify_keys

    - name: Assert user, NOPASSWD sudo and SSH key are in place
      ansible.builtin.assert:
        that:
          - api_access_verify_sudoers.stat.exists
          - api_access_verify_sudoers.stat.mode == '0440'
          - "'NOPASSWD:ALL' in (api_access_verify_sudoers_content.content | b64decode)"
          - "'molecule-bootstrap-test' in (api_access_verify_keys.content | b64decode)"
        fail_msg: "api_access bootstrap did not fully provision the iac user"
