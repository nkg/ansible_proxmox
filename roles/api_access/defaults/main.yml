---
# defaults file for nkg.proxmox.api_access
# Ported from Regularmusic/iac proxmox_api_setup.

# Linux + Proxmox PAM username for the IaC admin account. The Proxmox group,
# role and ACL are derived from this (<user>-group, <user>-role).
api_access_user: "iac"

# Proxmox API role privileges granted to the IaC role. This is the full
# Terraform/OpenTofu-capable set used by the source role (from
# Regularmusic/iac group_vars/all.yml proxmox_admin_role_privileges).
api_access_role_privileges:
  - Datastore.Allocate
  - Datastore.AllocateSpace
  - Datastore.AllocateTemplate
  - Datastore.Audit
  - Datastore.Read
  - Group.Allocate
  - Mapping.Audit
  - Mapping.Modify
  - Mapping.Use
  - Permissions.Modify
  - Pool.Allocate
  - Pool.Audit
  - Realm.Allocate
  - Realm.AllocateUser
  - SDN.Allocate
  - SDN.Audit
  - SDN.Use
  - Sys.AccessNetwork
  - Sys.Audit
  - Sys.Console
  - Sys.Incoming
  - Sys.Modify
  - Sys.PowerMgmt
  - Sys.Syslog
  - User.Modify
  - VM.Allocate
  - VM.Audit
  - VM.Backup
  - VM.Clone
  - VM.Config.CDROM
  - VM.Config.CPU
  - VM.Config.Cloudinit
  - VM.Config.Disk
  - VM.Config.HWType
  - VM.Config.Memory
  - VM.Config.Network
  - VM.Config.Options
  - VM.Console
  - VM.GuestAgent.Audit
  - VM.GuestAgent.FileRead
  - VM.GuestAgent.FileSystemMgmt
  - VM.GuestAgent.FileWrite
  - VM.GuestAgent.Unrestricted
  - VM.Migrate
  - VM.PowerMgmt
  - VM.Replicate
  - VM.Snapshot
  - VM.Snapshot.Rollback

# SSH public key authorized for the IaC admin user (empty = skip).
api_access_admin_ssh_key: ""

# SSH public key authorized for root (empty = skip).
api_access_root_ssh_key: ""

# Storage pools whose content types should be configured, as a dict of
# {pool_name: "content,types,csv"}. Empty (the default) skips the storage step.
# Example:
#   api_access_storage_pools:
#     local: "iso,vztmpl,snippets,backup,import"
#     storage: "images,snippets"
api_access_storage_pools: {}

# Optional path on the controller to write the generated API token secret to.
# Empty (the default) means the token is only exposed via the api_access_token
# fact and never written to disk. This role never calls SOPS.
api_access_token_output_path: ""
