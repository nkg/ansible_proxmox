---
# handlers file for nkg.proxmox.host_config
# Ported from Regularmusic/iac proxmox_setup handlers.

- name: Update GRUB
  ansible.builtin.command: update-grub
  changed_when: true

- name: Restart pveproxy
  ansible.builtin.service:
    name: pveproxy
    state: restarted

- name: Check for ifreload binary
  listen: "Restart networking"
  ansible.builtin.stat:
    path: /usr/sbin/ifreload
  register: host_config_ifreload_bin

- name: Reload networking with ifreload
  listen: "Restart networking"
  ansible.builtin.command: /usr/sbin/ifreload -a
  when: host_config_ifreload_bin.stat.exists
  changed_when: true

- name: Restart networking with ifdown/ifup (fallback)
  listen: "Restart networking"
  ansible.builtin.shell: |
    nohup bash -c 'sleep 1; ifdown --all --exclude=lo; ifup --all --exclude=lo' >/dev/null 2>&1 &
  async: 30
  poll: 0
  changed_when: true
  when: not host_config_ifreload_bin.stat.exists

- name: Update APT cache
  ansible.builtin.apt:
    update_cache: true

- name: Reload sysctl
  ansible.builtin.command: sysctl --system
  changed_when: true

- name: Reload systemd daemon
  ansible.builtin.systemd_service:
    daemon_reload: true

- name: Remount /tmp with exec  # noqa: command-instead-of-module
  # ansible.posix.mount manages /etc/fstab too, but /tmp here is owned by
  # systemd's tmp.mount unit (not fstab). Keep the raw mount command so we
  # don't accidentally write a duplicate /tmp entry to fstab.
  ansible.builtin.command: mount -o remount,nosuid,nodev /tmp
  changed_when: true
