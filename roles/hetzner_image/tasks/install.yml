---
# Ported from Regularmusic/iac proxmox_install.
# Boot the autoinstall ISO under QEMU to install Proxmox VE onto the bare
# metal disks. This takes 10-20 minutes.

- name: Build QEMU disk drive arguments
  ansible.builtin.set_fact:
    hetzner_image_qemu_drive_args: >-
      {% for disk in hetzner_image_disks %}
      -drive file={{ disk }},format=raw,media=disk,if=virtio
      {% endfor %}

- name: Build UEFI arguments
  ansible.builtin.set_fact:
    hetzner_image_qemu_uefi_args: "{{ '-bios ' + hetzner_image_ovmf_path if hetzner_image_uefi_support.stat.exists else '' }}"

- name: Build display arguments
  ansible.builtin.set_fact:
    hetzner_image_qemu_display_args: >-
      {% if hetzner_image_debug | default(false) | bool %}
      -vnc 127.0.0.1{{ hetzner_image_debug_vnc_display }}
      -monitor telnet:127.0.0.1:{{ hetzner_image_debug_monitor_port }},server,nowait
      {% else %}
      -display none
      {% endif %}

- name: Install Proxmox VE via QEMU (this takes 10-20 minutes)
  ansible.builtin.shell: |
    set -euo pipefail
    qemu-system-x86_64 \
        -enable-kvm \
        {{ hetzner_image_qemu_uefi_args }} \
        -cpu host \
        -smp {{ hetzner_image_qemu.cpus }} \
        -m {{ hetzner_image_qemu.memory }} \
        -boot d \
        -cdrom {{ hetzner_image_autoinstall_iso_dest }} \
        -device e1000,netdev=net0,bus=pci.0,addr=0x05 \
        -netdev user,id=net0 \
        {{ hetzner_image_qemu_drive_args }} \
        {{ hetzner_image_qemu_display_args }} \
        -no-reboot \
        -serial stdio > /root/qemu_install.log 2>&1
  args:
    executable: /bin/bash
  async: "{{ hetzner_image_qemu.install_timeout }}"
  poll: 0
  register: hetzner_image_install_job
  changed_when: true

- name: Display VNC connection info
  vars:
    hetzner_image_vnc_port: "{{ 5900 + (hetzner_image_debug_vnc_display | replace(':', '') | int) }}"
  ansible.builtin.debug:
    msg: |
      ============================================
      DEBUG MODE: VNC enabled for install phase
      ============================================
      VNC is bound to localhost on the server.
      Open an SSH tunnel, then connect your VNC client:

        ssh -L {{ hetzner_image_vnc_port }}:127.0.0.1:{{ hetzner_image_vnc_port }} root@{{ hetzner_image_main_ipv4 }}

      Monitor: ssh {{ hetzner_image_main_ipv4 }} 'nc 127.0.0.1 {{ hetzner_image_debug_monitor_port }}'
      ============================================
  when: hetzner_image_debug | default(false) | bool

- name: Wait for QEMU install to complete
  ansible.builtin.async_status:
    jid: "{{ hetzner_image_install_job.ansible_job_id }}"
  register: hetzner_image_install_result
  until: hetzner_image_install_result.finished
  retries: 240
  delay: 15

- name: Display install result
  ansible.builtin.debug:
    msg: >-
      QEMU install finished={{ hetzner_image_install_result.finished | default(false) }},
      rc={{ hetzner_image_install_result.rc | default('N/A') }}

- name: Fail if QEMU exited with an error
  ansible.builtin.fail:
    msg: >-
      QEMU install process failed with rc={{ hetzner_image_install_result.rc }}.
      Check /root/qemu_install.log on the target for details.
  when: hetzner_image_install_result.rc | default(0) | int != 0

- name: Verify installation wrote to disk
  ansible.builtin.command: blkid {{ hetzner_image_disks[0] }}
  register: hetzner_image_install_blkid
  changed_when: false
  failed_when: hetzner_image_install_blkid.rc != 0
