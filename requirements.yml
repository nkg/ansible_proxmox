---
# External content required by the nkg.proxmox collection.
#
# Collections are also declared in galaxy.yml `dependencies` (installed
# automatically with the collection). They are repeated here so the roles can
# be developed/tested standalone with:
#   ansible-galaxy collection install -r requirements.yml
#   ansible-galaxy role install -r requirements.yml
collections:
  - name: ansible.posix
  - name: community.general
  - name: ansible.utils

roles:
  # CIS/STIG hardening baseline applied by the nkg.proxmox.security role.
  # Standalone Galaxy role (not a collection), so it can't live in galaxy.yml.
  - src: https://github.com/konstruktoid/ansible-role-hardening/archive/refs/tags/v4.6.0.tar.gz
    name: konstruktoid.hardening
