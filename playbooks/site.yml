---
# Configure and harden an already-running Proxmox VE host.
#
#   ansible-galaxy collection install git+https://github.com/nkg/ansible_proxmox.git
#   ansible-playbook nkg.proxmox.site -i your-inventory.yml
#
# Point the `proxmox` inventory group at your node(s). For the Terraform/IaC
# API user + token, run nkg.proxmox.api_access separately (see its README).
- name: Configure and harden Proxmox VE
  hosts: proxmox
  become: true
  # Proxmox CLI + many hardening commands live in /usr/sbin, which isn't on PATH
  # under a non-login su. Put it on PATH for every task (incl. konstruktoid).
  environment:
    PATH: "/usr/sbin:/sbin:{{ ansible_env.PATH | default('/usr/bin:/bin') }}"
  # Role-level tags propagate to every task in the role, so you can stage a
  # validation run with e.g. --tags repos,host_base (see
  # docs/real-host-validation.md).
  roles:
    - role: nkg.proxmox.repos
      tags: repos
    - role: nkg.proxmox.host_base
      tags: host_base
    - role: nkg.proxmox.host_config
      tags: host_config
      vars:
        # Companion fixes for the konstruktoid hardening applied below:
        # restore the lxc-* AppArmor stubs and /tmp exec it would otherwise break.
        host_config_lxc_apparmor_fix: true
        host_config_tmp_exec_override: true
    - role: nkg.proxmox.security
      tags: security
    - role: nkg.proxmox.crowdsec
      tags: crowdsec
