---
version: 2
updates:
  # Keep the GitHub Actions used by the CI workflows up to date.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"

  # Keep the Python CI tooling (ansible-lint, molecule, yamllint) up to date.
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"
