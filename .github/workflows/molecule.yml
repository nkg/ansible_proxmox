---
name: Molecule

"on":
  push:
    branches: [main]
  pull_request:

jobs:
  molecule:
    # api_access runs its container-testable 'bootstrap' scenario (the Linux IaC
    # user); its Proxmox-API half, plus security and hetzner_image, need a real
    # Proxmox host / QEMU / konstruktoid and are tested out of band.
    uses: nkg/github-actions/.github/workflows/molecule.yml@v2
    with:
      roles: |
        api_access
        crowdsec
        host_base
        host_config
        repos
      roles-dir: roles
      requirements-file: requirements.yml
